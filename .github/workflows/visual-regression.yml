# Visual regression — Playwright screenshot tests of the component Storybook.
#
# This lane builds the static `@knitui/components` Storybook, provisions a
# Playwright Chromium browser, and diffs a handful of representative stories
# against committed baseline snapshots (see packages/components/visual/).
#
# NOTE: baseline snapshots do not exist until a maintainer generates + commits
# them with:
#
#   pnpm --filter @knitui/components test:visual -- --update-snapshots
#
# Until baselines land, the `test:visual` step is `continue-on-error: true` so a
# missing baseline does NOT turn the build red — the Playwright report (with any
# diff images) is always uploaded as an artifact for review. Once baselines are
# committed, REMOVE `continue-on-error` from that step to make the lane enforcing.

name: Visual Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: visual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  visual:
    name: Playwright visual
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @knitui/components exec playwright install --with-deps chromium

      - name: Build component Storybook
        run: pnpm --filter @knitui/components build-storybook

      # Enforcing once baselines are committed: remove `continue-on-error` below.
      - name: Run visual tests
        continue-on-error: true
        run: pnpm --filter @knitui/components test:visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/components/playwright-report
            packages/components/test-results
          retention-days: 14
          if-no-files-found: ignore
