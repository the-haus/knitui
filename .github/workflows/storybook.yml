# Storybook → GitHub Pages
#
# Builds the AGGREGATE Storybook (apps/storybook) — one site composing every
# @knitui package's stories — and deploys it to GitHub Pages.
#
# `@knitui/storybook`'s build (scripts/build-all.mjs) builds the root manager
# into apps/storybook/storybook-static/ and each package's own Storybook into a
# subfolder, which the root's relative `refs` stitch together.
#
# ONE-TIME SETUP (repo owner): Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Without that, the `deploy` job's
# `actions/deploy-pages` step fails with "Pages site not found".

name: Storybook

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "apps/storybook/**"
      - ".github/workflows/storybook.yml"
  workflow_dispatch:

# GITHUB_TOKEN grants for the whole workflow: read the repo, deploy Pages, and
# mint the OIDC token `deploy-pages` verifies with.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialise Pages deploys; never cancel an in-flight deploy (GitHub's
# recommended settings for the Pages environment).
concurrency:
  group: pages
  cancel-in-progress: false

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # The components Storybook (~1,100 stories) is memory-hungry to bundle;
      # give Node headroom so the build doesn't OOM on the runner.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build aggregate Storybook
        run: pnpm --filter @knitui/storybook build-storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/storybook/storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Only publish from main (workflow_dispatch on another branch just builds).
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
