name: Bug report
description: Report a reproducible problem in Knit UI
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        fields below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug, including any error messages.
      placeholder: When I render <Button variant="gradient" /> on Android…
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps (or a link to a minimal repro repo / snack) that reliably trigger the bug.
      placeholder: |
        1. Render '...'
        2. Tap '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Affected package(s)
      description: Which "@knitui/*" package(s) does this affect? Pick the closest one.
      multiple: true
      options:
        - "@knitui/core"
        - "@knitui/components"
        - "@knitui/hooks"
        - "@knitui/icons"
        - "@knitui/graphics"
        - "@knitui/dates"
        - "@knitui/carousel"
        - "@knitui/map"
        - "@knitui/media"
        - "@knitui/sheet"
        - "@knitui/plugins"
        - "Not sure / other"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where does the bug occur?
      options:
        - iOS
        - Android
        - Web
        - All platforms
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version(s)
      description: The "@knitui/*" version(s) you're on (e.g. 0.3.1). Run `pnpm why @knitui/components` if unsure.
      placeholder: "0.x.x"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Anything else that might help — OS/device, React Native / Expo / Next.js
        versions, Reanimated/Skia versions, logs, screenshots, or recordings.
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true
        - label: I have provided a minimal reproduction of the problem.
          required: true
